<!DOCTYPE html>
<html lang="en">

{{template "head" .}}

<body>
  <header class="flex center-vertically">
    <h1>Grocceries</h1>
    {{template "nav"}}
  </header>
  <main>
    <h2>To be picked</h2>
    <div class="glass">
      <div class="grid-5">
        <div class="checkbox">
        </div>
        <p class="cell">Product</p>
        <p class="cell">Brand</p>
        <p class="cell">Amount</p>
        <p class="cell">Store</p>
      </div>
      <div class="grid-5">
        <div class="checkbox">
          <input type="checkbox" id="picked" name="picked" />
          <label for="picked">Picked</label>
        </div>
        <p class="cell">Mjölk</p>
        <p class="cell">Arla</p>
        <p class="cell">4st</p>
        <p class="cell">Ica</p>
      </div>

      <div class="grid-5">
        <div class="checkbox">
          <input type="checkbox" id="picked" name="picked" />
          <label for="picked">Picked</label>
        </div>
        <p class="cell">Köttbullar</p>
        <p class="cell">Mamma scans</p>
        <p class="cell">1st</p>
        <p class="cell">Willys</p>
      </div>

    </div>
    <h2>Picked</h2>
    <div class="glass">
      <div class="grid-5">
        <div class="checkbox">
          <input type="checkbox" id="picked" name="picked" checked />
          <label for="picked">Picked</label>
        </div>
        <p class="cell">Kanelbullar</p>
        <p class="cell">Garant</p>
        <p class="cell">100kg</p>
        <p class="cell">Hemköp</p>
      </div>
    </div>
  </main>
  <script src="/static/script.js"></script>
</body>

</html>
