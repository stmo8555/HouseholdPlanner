<!DOCTYPE html>
<html lang="en">

{{template "head" .}}

<body>
    <header class="flex center-vertically">
        <h1>Groceries</h1>
        {{template "nav"}}
    </header>
    <main>
        <h2>To be picked</h2>
        <div class="glass">
            <div class="grid-5">
                <div class="checkbox"></div>
                <a href="/login"class="cell">Product</a>
                <a class="cell">Brand</a>
                <a class="cell">Amount</a>
                <a class="cell">Store</a>
            </div>
            {{range .Data.NotPicked}}
            <!-- {{if not .Picked}} -->
            <div class="grid-5">
                <div class="checkbox">
                    <input type="checkbox" id="picked" name="picked" />
                    <label for="picked">Picked</label>
                </div>
                <p class="cell">{{.Product}}</p>
                <p class="cell">{{.Brand}}</p>
                <p class="cell">{{.Amount}} {{.Unit}}</p>
                <p class="cell">{{.Store}}</p>
            </div>
            <!-- {{end}} -->
            {{end}}
        </div>
            <h2>Picked</h2>
            <div class="glass">
                {{range .Data.Picked}}
                <!-- {{if .Picked}} -->
                <div class="grid-5">
                    <div class="checkbox">
                        <input type="checkbox" id="picked" name="picked" checked />
                        <label for="picked">Picked</label>
                    </div>
                    <p class="cell">{{.Product}}</p>
                    <p class="cell">{{.Brand}}</p>
                    <p class="cell">{{.Amount}} {{.Unit}}</p>
                    <p class="cell">{{.Store}}</p>
                </div>
                {{end}}
                <!-- {{end}} -->
            </div>
    </main>
    <script src="/static/script.js"></script>
</body>

</html>
