<!DOCTYPE html>
<html lang="en">

{{template "head" .}}

<body>
    {{template "header" .}}
    <div id="add-recipe-overlay" class="overlay">
        <div id="add-recipe-modal" class="glass fixed-center">
            <h2 class="margin-inline-24px">Add Recipe</h2>
            <form class="add-grocery-form" method="post" action="/recipes/add">
                <div class="margin-inline-24px">
                    <label for="1">Link</label>
                    <input class="focus" id="1" type="text" name="link" required>
                    <div class="text-align-center">
                        <button type="submit">add</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <main>
        <div class="margin-block-end-24px">
            <button id="add-recipe">Add Recipe</button>
        </div>

        <div class="grid-recipe">
            {{range .Data}}
            <div class="glass recipe-card">
                <div class="image-wrapper">
                    <img src="{{.Img_url}}" alt="{{.Title}}">
                </div>
                <div class="title">
                    <p>{{.Title}}</p>
                    <a href="{{.Link}}" class="button-styling">Visit</a>
                </div>
            </div>
            {{end}}
        </div>
    </main>
    {{template "footer" .}}
    <script src="/static/script.js"></script>
    <script>
        const add_recipe_btn = document.getElementById('add-recipe');
        const overlay_recipe = document.getElementById("add-recipe-overlay");
        const main = document.querySelector("main")
        const add_recipe_modal = document.getElementById("add-recipe-modal"); // the inner modal content
        const focusables = document.querySelectorAll(".focus");

        add_recipe_btn.addEventListener("click", () => {
            overlay_recipe.style.display = "block";
            main.style.display = "none"
            overlay_recipe.style.cursor = "pointer"
            add_recipe_modal.style.cursor = "default"
            focusables.forEach(e => {
                e.focus();
            });
        });

        overlay_recipe.addEventListener("click", (e) => {
            if (!add_recipe_modal.contains(e.target)) {
                overlay_recipe.style.display = "none";
                main.style.display = "block"
            }
        });
    </script>
</body>

</html>
