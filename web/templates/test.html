<!DOCTYPE html>
<html lang="en">

{{template "head" .}}

<body>
    <header class="flex center-vertically">
        <h1>Groceries</h1>
        {{template "nav"}}
    </header>
    <main>
        <div class='glass'>
            <h2 class="table_h2">Shopping ({{ len .Data }} items)</h2>
            <table>
                <thead>
                    <tr class="t">
                        <th>
                        </th>
                        <th>
                            <a href="/groceries?sort=product">Product</a>
                        </th>

                        <th>
                            <a href="/groceries?sort=brand"> Brand </a>
                        </th>

                        <th>
                            <a href="/groceries?sort=amount"> Amount </a>
                        </th>
                        <th>
                            <a href="/groceries?sort=store"> Store </a>
                        </th>
                    </tr>
                </thead>
                <tbody>
                    {{range .Data}}
                    <tr>
                        <td>
                            <form method="POST" action="/groceries">
                                    <button class="checkbox" type="submit" name="id" value="{{.Id}}"></button>
                            </form>
                        </td>
                        <td>{{.Product}}</td>
                        <td>{{.Brand}}</td>
                        <td>{{.Amount}} {{.Unit}}</td>
                        <td>
                            <div class='store'>{{.Store}}</div>
                        </td>
                    </tr>
                    {{end}}
                </tbody>
            </table>
        </div>
    </main>
    <script src="/static/script.js"></script>
</body>

</html>
