<!DOCTYPE html>
<html lang="en">
{{template "head" .}}

<body class="flower-power">
    <div class="background">
        {{template "header" .}}
        <main>
            
            <form class="login-form" method="POST" action="/login">
                <label for="uname">Username</label>
                <input class="glass-inner" type="text" id="uname" name="uname" required>

                <label for="pwd">Password</label>
                <input class="glass-inner" type="password" id="pwd" name="pwd" required>

                <button class="login-button" type="submit">Login</button>
            </form>
        </main>
        {{template "footer" .}}
        <script src="/static/script.js"></script>
        <script>
            document.querySelectorAll(".header-items").forEach(container => {
                container.querySelectorAll(":scope > *").forEach(child => {
                    if (child.tagName !== "H1") {
                        child.remove();
                    }
                });
            });
        </script>
    </div>
</body>

</html>
