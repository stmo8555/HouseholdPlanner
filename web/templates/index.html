<!DOCTYPE html>
<html lang="en">

{{template "head" .}}

<body>
    {{template "header" .}}
    <main>
        <div class="home-wrapper margin-block-end-24px">
            <div class="glass padding-inline-24px ai-prompt">
                <h2>Your AI friend</h2>
                <form class="todo-form margin-block-end-24px" method="post" action="/todos/add">
                    <label class="glass" for="1">
                        <!-- swap with textarea -->
                        <input placeholder="What do you want me to add..." id="1" type="text" name="todo" required>
                    </label>
                    <button class="" type="submit"><img src="/static/assets/send.svg"></button>
                </form>
            </div>

            <div class="glass padding-inline-24px">
                <h3>Recipe of the Day</h3>
                <img style="height: 100px;"
                    src="https://www.peelwithzeal.com/wp-content/uploads/2022/08/cajun-garlic-butter-sauce-4-1024x1536.jpg">
                <p>random recipe</p>
            </div>
            <div class="glass padding-inline-24px">
                <h3>Quick Overview</h3>
                <div class="glass padding-inline-24px flex space-between align-items margin-block-end-12px">
                    <div>
                        <small>Active Tasks</small>
                        <p><strong>{{.Todos}}</strong></p>
                    </div>
                    <img class="circle" src="/static/assets/check.svg">
                </div>
                <div class="glass padding-inline-24px flex space-between align-items margin-block-end-24px">
                    <div>
                        <small>Groceries to Buy</small>
                        <p><strong>{{.Groceries}}</strong></p>
                    </div>
                    <img class="circle" src="/static/assets/shopping-cart.svg">
                </div>

            </div>
            <div class="glass padding-inline-24px">
                <h3>Quick Add Grocery</h3>
                <form class="todo-form margin-block-end-24px" method="post" action="/todos/add">
                    <label class="glass" for="1">
                        <input placeholder="Enter product name..." id="1" type="text" name="todo" required>
                    </label>
                    <button class="" type="submit">+</button>
                </form>
            </div>
            <div class="glass padding-inline-24px">
                <h3>Quick Add Recipe</h3>
                <form class="todo-form margin-block-end-24px" method="post" action="/todos/add">
                    <label class="glass" for="1">
                        <input placeholder="Paste recipe link..." id="1" type="text" name="todo" required>
                    </label>
                    <button class="" type="submit">+</button>
                </form>
            </div>
        </div>
    </main>
    {{template "footer" .}}
    <script src="/static/script.js"></script>
</body>

</html>
