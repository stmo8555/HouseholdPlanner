  <header class="flex center-vertically">

  <main>
    <div class="group glass">

        <h2>Recuring</h2>
        <span class="filters">
          <span class="filter">
            <input type="radio" id="filter1" name="filter" value="Today" checked />

          </span>
          <span class="filter">

          </span>
        </span>
      </div>
      <ul>
        <li class="chore glass center-in-div">
          <p><strong>Dammsuga</strong></p>
          <span>
            <button>Done</button>
            <button>Edit</button>
          </span>
        </li>
        <li class="chore glass">
          <p><strong>Handla</strong></p>
          <span>
            <button>Done</button>
            <button>Edit</button>
          </span>
        </li>
        <li class="chore glass">
          <p><strong>Vattna</strong></p>
          <span>
            <button>Done</button>
            <button>Edit</button>
          </span>
        </li>
      </ul>
      <button class="chore-button">Add</button>
    </div>

    <div class="group glass">
      <ul>

        <h2>Temporary</h2>
        <li class="chore glass">
          <p><strong>Dammsuga</strong></p>

            <button>Done</button>

        <li class="chore glass">

            <button>Done</button>
            <button>Archive</button>
          </span>
        </li>
      </ul>
      <button class="chore-button">Add</button>
    </div>
  </main>
  <script src="index.js"></script>
